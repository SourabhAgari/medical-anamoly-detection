
# =============================================================================
# Log4j 2 configuration — Med-Flink
#
# Uses PatternLayout with a JSON pattern — requires zero extra JARs.
# %enc{...}{JSON} handles all escaping so output is always valid JSON.
# MDC fields vitalId and wardId are top-level JSON keys (set via MDC.put).
#
# Appenders:
#   ConsoleAppender  — stdout (captured by container runtime / Fluent Bit DaemonSet)
# =============================================================================

# JSON pattern: one object per line, newline-terminated
property.jsonPattern={"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS}{UTC}","level":"%p","logger":"%c{1}","message":"%enc{%m}{JSON}","vitalId":"%X{vitalId}","wardId":"%X{wardId}","thread":"%t","exception":"%enc{%xEx}{JSON}"}

# ── Console appender (stdout → docker logs) ──────────────────────────────────
appender.console.type=Console
appender.console.name=ConsoleAppender
appender.console.layout.type=PatternLayout
appender.console.layout.pattern=${property.jsonPattern}%n

# ── Root logger ───────────────────────────────────────────────────────────────
rootLogger.level=INFO
rootLogger.appenderRef.console.ref=ConsoleAppender

# ── Application namespace ─────────────────────────────────────────────────────
logger.app.name=com.healthcare.vitals
logger.app.level=INFO
logger.app.additivity=false
logger.app.appenderRef.console.ref=ConsoleAppender

# ── Noise reduction ───────────────────────────────────────────────────────────
logger.kafka.name=org.apache.kafka.clients
logger.kafka.level=WARN

logger.flinkHeartbeat.name=org.apache.flink.runtime.heartbeat
logger.flinkHeartbeat.level=WARN

logger.flinkCheckpoint.name=org.apache.flink.runtime.checkpoint
logger.flinkCheckpoint.level=INFO

logger.zookeeper.name=org.apache.zookeeper
logger.zookeeper.level=WARN